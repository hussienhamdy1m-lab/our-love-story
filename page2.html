<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سينما الذكاء الاصطناعي 🧠🎬</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="page2.css">
</head>
<body>

    <audio id="bg-music" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <button class="back-home-btn" onclick="goBackHome()">⬅️ العودة للرئيسية</button>

    <div class="ai-interface-container">
        
        <div id="ai-console" class="ai-console-box">
            <h2 style="color: #ff4a75; font-size: 1.4rem; margin-bottom: 10px; font-weight: 700;">نظام تشغيل ذكريات شهد 🤖</h2>
            <p class="console-hint">اضغطي على أي مشهد لتوليد وعرض الفيديو بنقلة الـ AI الفائقة..</p>
            
            <div class="ai-commands-list">
                <button class="ai-cmd-btn" onclick="generateAiMemory(1)">🧠 تشغيل مصفوفة المشهد الأول</button>
                <button class="ai-cmd-btn" onclick="generateAiMemory(2)">🧠 تشغيل مصفوفة المشهد الثاني</button>
                <button class="ai-cmd-btn" onclick="generateAiMemory(3)">🧠 تشغيل مصفوفة المشهد الثالث</button>
                <button class="ai-cmd-btn" onclick="generateAiMemory(4)">🧠 تشغيل مصفوفة المشهد الرابع</button>
                <button class="ai-cmd-btn" onclick="generateAiMemory(5)">🧠 تشغيل مصفوفة المشهد الخامس</button>
            </div>
        </div>

        <div id="cinema-theater" class="theater-wrapper" style="display: none; opacity: 0;">
            <div class="cinematic-frame" id="cinema-frame">
                
                <div id="ai-glitch" class="ai-glitch-overlay"></div>
                <div id="ai-blur" class="ai-blur-overlay"></div>
                <div id="light-leak" class="light-leak-overlay"></div>
                
                <div class="video-slide" id="slide-1"><video id="vid1" playsinline controls loop><source src="vid1.mp4" type="video/mp4"></video></div>
                <div class="video-slide" id="slide-2"><video id="vid2" playsinline controls loop><source src="vid2.mp4" type="video/mp4"></video></div>
                <div class="video-slide" id="slide-3"><video id="vid3" playsinline controls loop><source src="vid3.mp4" type="video/mp4"></video></div>
                <div class="video-slide" id="slide-4"><video id="vid4" playsinline controls loop><source src="vid4.mp4" type="video/mp4"></video></div>
                <div class="video-slide" id="slide-5"><video id="vid5" playsinline controls loop><source src="vid5.mp4" type="video/mp4"></video></div>
            </div>

            <div class="subtitle-box">
                <p id="subtitle-text"></p>
            </div>

            <button class="return-console-btn" onclick="returnToConsole()">⚙️ إعادة تشغيل نظام الـ AI</button>
        </div>

    </div>

    <script src="page2.js"></script>
</body>
</html>
