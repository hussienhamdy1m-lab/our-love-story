<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سينما حكاياتنا 🎬</title>
    <link href="https://fonts.googleapis.com/css2 family=Cairo:wght@400;700;900&family=Aref+Ruqaa:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="page2.css">
</head>
<body>

    <audio id="bg-music" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <button class="back-home-btn" onclick="goBackHome()">⬅️ العودة للرئيسية</button>

    <div id="envelope-stage" class="envelope-wrapper">
        <p class="envelope-hint">اضغطي على الجواب لفتح صندوق المفاجآت.. ❤️</p>
        <div class="envelope" onclick="openEnvelope()">
            <div class="front-flap"></div>
            <div class="pocket"></div>
            <div class="letter">
                <p>إلى شهودتي.. ❤️</p>
                <p style="font-size: 0.85rem; margin-top: 5px;">جاهزة لرحلة جوة ذكرياتنا؟</p>
            </div>
            <div class="hearts-seal">❤️</div>
        </div>
    </div>

    <div id="cinema-stage" class="cinema-container" style="display: none; opacity: 0;">
        <div class="cinema-screen">
            
            <div class="slide active">
                <video controls playsinline id="main-video">
                    <source src="vid1.mp4" type="video/mp4">
                </video>
                <div class="caption">
                    <h2>المشهد الأول 🎬</h2>
                    <p>كل لحظة متسجلة هنا هي حكاية عمر كامل بحاله.. تفرجِ وعيشي اللحظة يا شهدي.</p>
                </div>
            </div>

        </div>
    </div>

    <script src="page2.js"></script>
</body>
</html>
