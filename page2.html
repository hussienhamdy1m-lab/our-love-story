<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سينما الحكايات الذكية 🧠❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="page2.css">
</head>
<body>

    <audio id="bg-music" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <button class="back-home-btn" onclick="goBackHome()">⬅️ العودة للرئيسية</button>

    <div id="ai-neural-bg"></div>

    <div class="dreamweaver-wrapper">
        <div class="cinematic-frame">
            
            <div id="tv-static" class="screen-static"></div>
            
            <div class="video-slide active">
                <video id="vid1" playsinline controls loop>
                    <source src="vid1.mp4" type="video/mp4">
                </video>
            </div>

            <div class="video-slide">
                <video id="vid2" playsinline controls loop>
                    <source src="vid2.mp4" type="video/mp4">
                </video>
            </div>

            <div class="video-slide">
                <video id="vid3" playsinline controls loop>
                    <source src="vid3.mp4" type="video/mp4">
                </video>
            </div>

        </div>

        <div class="subtitle-box">
            <p id="subtitle-text" class="woven-text"></p>
        </div>

        <div class="modern-nav">
            <button class="nav-btn-modern" onclick="changeScene(-1)">◀️ المشهد السابق</button>
            <button class="nav-btn-modern next-btn-modern" onclick="changeScene(1)">المشهد التالي ▶️</button>
        </div>
    </div>

    <script src="page2.js"></script>
</body>
</html>
