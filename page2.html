<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سينما الذكاء الاصطناعي 🧠🎬</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="page2.css">
</head>
<body>

    <audio id="bg-music" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <button class="back-home-btn" onclick="goBackHome()">⬅️ العودة للرئيسية</button>

    <div id="ai-matrix-bg"></div>

    <div class="ai-interface-container">
        
        <div id="ai-console" class="ai-console-box">
            <div class="console-header">
                <span class="status-dot"></span>
                <span class="console-title">AI MEMORY GENERATOR v2.5</span>
            </div>
            <p class="console-hint">اضغطي على الأوامر الذكية أدناه لتوليد وعرض المشاهد السحرية..</p>
            
            <div class="ai-commands-list">
                <button class="ai-cmd-btn" onclick="generateAiMemory(0)">🤖 Execute_Memory_Command_01.exe</button>
                <button class="ai-cmd-btn" onclick="generateAiMemory(1)">🤖 Execute_Memory_Command_02.exe</button>
                <button class="ai-cmd-btn" onclick="generateAiMemory(2)">🤖 Execute_Memory_Command_03.exe</button>
            </div>
        </div>

        <div id="cinema-theater" class="theater-wrapper" style="display: none; opacity: 0;">
            <div class="cinematic-frame" id="cinema-frame">
                <div id="ai-glitch" class="ai-glitch-overlay"></div>
                <div id="ai-blur" class="ai-blur-overlay"></div>
                <div id="light-leak" class="light-leak-overlay"></div>
                
                <div class="video-slide" id="slide-0"><video id="vid0" playsinline controls loop><source src="vid1.mp4" type="video/mp4"></video></div>
                <div class="video-slide" id="slide-1"><video id="vid1" playsinline controls loop><source src="vid2.mp4" type="video/mp4"></video></div>
                <div class="video-slide" id="slide-2"><video id="vid2" playsinline controls loop><source src="vid3.mp4" type="video/mp4"></video></div>
            </div>

            <div class="subtitle-box">
                <p id="subtitle-text"></p>
            </div>

            <button class="return-console-btn" onclick="returnToConsole()">⚙️ إعادة تشغيل نظام الـ AI</button>
        </div>

    </div>

    <script src="page2.js"></script>
</body>
</html>
