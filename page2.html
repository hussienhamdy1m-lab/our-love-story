<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تلفزيون الذكريات 📺</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="page2.css">
</head>
<body>

    <audio id="bg-music" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <button class="back-home-btn" onclick="goBackHome()">⬅️ العودة للرئيسية</button>

    <div class="retro-tv-container">
        
        <div class="retro-tv">
            <div class="tv-inner-screen">
                
                <div id="tv-static" class="tv-static-effect"></div>
                
                <div class="tv-channel active">
                    <video id="video1" playsinline loop>
                        <source src="vid1.mp4" type="video/mp4">
                    </video>
                </div>

                <div class="tv-channel">
                    <video id="video2" playsinline loop>
                        <source src="vid2.mp4" type="video/mp4">
                    </video>
                </div>

                <div class="tv-channel">
                    <video id="video3" playsinline loop>
                        <source src="vid3.mp4" type="video/mp4">
                    </video>
                </div>

            </div>

            <div class="tv-controls-panel">
                <div class="tv-dial" onclick="nextChannel()"></div>
                <div class="tv-btn" onclick="nextChannel()">CH +</div>
                <div class="tv-btn" onclick="prevChannel()">CH -</div>
                <div class="tv-power-light"></div>
            </div>
        </div>

        <div class="movie-subtitles">
            <p id="subtitle-text">المشهد الأول: هنا بتكتب كلامك الرايق الهادي اللي هيظهر مع أول فيديو...</p>
        </div>

        <div class="remote-control">
            <button class="remote-btn" onclick="prevChannel()">◀️ القناة السابقة</button>
            <button class="remote-btn play-btn" onclick="togglePlayVideo()">تشغيل / إيقاف مؤقت 🎥</button>
            <button class="remote-btn" onclick="nextChannel()">القناة التالية ▶️</button>
        </div>

    </div>

    <script src="page2.js"></script>
</body>
</html>
