<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع ذكرياتنا السحري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Aref+Ruqaa:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- الموسيقى الأساسية للموقع كله -->
    <audio id="bg-music" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <!-- طبقة تأثير المطر (القلوب والنجوم) -->
    <div id="rain-layer"></div>
    <div id="golden-glow"></div>

    <!-- مشهد الترحيب الأول (قفل كلمة السر) -->
    <div id="welcome-screen" class="glass-panel">
        <h1 class="main-title">مرحباً بكِ في عالمنا الخاص</h1>
        <p class="sub-title">هذا المكان يحمل سراً لا يعرفه غيرنا..</p>
        <button class="magic-btn" onclick="showPasswordBox()">اضغطي للدخول</button>
    </div>

    <!-- 👑 صندوق كتابة كلمة السر (تم ضبط الـ IDs والزرار هنا بالملّي) 👑 -->
    <div id="login-screen" class="glass-panel" style="display: none; opacity: 0;">
        <h2 class="password-title">أدخلي كلمة السر السرية</h2>
        
        <!-- الخانة اللي شهد هتكتب فيها الجملة وبنفس الـ ID المظبوط للـ JS -->
        <input type="text" id="password-input" placeholder="اكتبي الجملة هنا..." autocomplete="off">
        
        <!-- الزرار مربوط بدالة الفحص بالملّي -->
        <button class="magic-btn" onclick="checkPassword()">قولتها، يلا ندخل ✨</button>
        
        <p id="error-message" style="display: none; color: #ff4a4a; margin-top: 15px; font-weight: bold;">الجملة خاطئة! حاولي مرة أخرى يا شهد ❤️</p>
    </div>

    <!-- المحتوى الرئيسي للموقع بعد فتح كلمة السر -->
    <div id="main-content" style="display: none;">
        <header class="site-header">
            <h1 class="site-title">متحف ذكرياتنا الجميلة</h1>
            <p class="site-subtitle">اضغطي على أي عنصر لتفتحي صندوق الذكريات</p>
        </header>

        <!-- العناصر التفاعلية السحرية في الصفحة الأولى -->
        <div class="interactive-container">
            <div class="memory-item" onclick="openMemory('envelope', event)">
                <img src="envelope.png" alt="الجواب">
                <span>الجواب الرومانسي</span>
            </div>
            <div class="memory-item" onclick="openMemory('camera', event)">
                <img src="camera.png" alt="الكاميرا">
                <span>لقطة الكاميرا</span>
            </div>
            
            <!-- زرار الانتقال لصفحة السينما التانية -->
            <div class="memory-item highlight-item" onclick="goToCinemaPage()">
                <img src="projector.png" alt="السينما">
                <span style="color: #ffde6a; font-weight: 900;">سينما حكاياتنا 🎬</span>
            </div>
            
            <div class="memory-item" onclick="openMemory('bottle', event)">
                <img src="bottle.png" alt="الزجاجة">
                <span>رسالة في زجاجة</span>
            </div>
        </div>
    </div>

    <!-- نافذة عرض الذكرى (البوب أب النظيف المريح للعين) -->
    <div id="memory-modal" class="modal-overlay" onclick="closeMemory()">
        <div id="modal-card" class="modal-card" onclick="event.stopPropagation()">
            <button class="close-modal-btn" onclick="closeMemory()">×</button>
            <h2 id="memory-title" class="modal-title"></h2>
            <div class="modal-body">
                <img id="memory-img" src="" alt="الذكرى" class="modal-image">
                <p id="memory-text" class="modal-text"></p>
            </div>
        </div>
    </div>

    <!-- تأثير شاتر الكاميرا -->
    <div id="shutter-top" class="shutter"></div>
    <div id="shutter-bottom" class="shutter"></div>
    <div id="flash-effect"></div>

    <script src="script.js"></script>
</body>
</html>
