<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قصتنا الحلوة 💖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bokeh"></div>
    <div class="bokeh"></div>
    <div class="bokeh"></div>

    <div id="flash-effect"></div>

    <!-- شاشة إدخال الباسورد -->
    <div id="login-screen" class="login-container">
        <h2>الباب السري 🔒</h2>
        <p>أدخل كلمة السر عشان تشوف المفاجأة ✨</p>
        <input type="password" id="password-input" placeholder="••••••••">
        <button onclick="checkPassword()">دخول الحكاية ✨</button>
        <p id="error-message" class="error">الباسورد غلط، حاول تاني! 🥺</p>
    </div>

    <!-- المحتوى الرئيسي للموقع -->
    <div id="main-content" style="display: none;">
        <h1 class="main-title">عالم ذكرياتنا السحري ✨</h1>
        <p class="main-subtitle">اضغطي على أي عنصر عشان تفتحي ذكرى مخفية...</p>

        <!-- شبكة العناصر التفاعلية (بقت أحجامها كبيرة وصور حقيقية) -->
        <div class="items-grid">
            
            <div class="magic-item" onclick="openMemory('envelope')">
                <div class="item-icon">
                    <img src="envelope.png" alt="جواب رومانسي">
                </div>
                <div class="item-label">الجواب الرومانسي</div>
            </div>

            <div class="magic-item" onclick="openMemory('camera')">
                <div class="item-icon">
                    <img src="camera.png" alt="كاميرا عتيقة">
                </div>
                <div class="item-label">الكاميرا العتيقة</div>
            </div>

            <div class="magic-item" onclick="openMemory('book')">
                <div class="item-icon">
                    <img src="book.png" alt="كتاب الحكايات">
                </div>
                <div class="item-label">كتاب الحكايات</div>
            </div>

            <div class="magic-item" onclick="openMemory('bottle')">
                <div class="item-icon">
                    <img src="bottle.png" alt="رسالة في زجاجة">
                </div>
                <div class="item-label">رسالة في زجاجة</div>
            </div>

            <div class="magic-item" onclick="openMemory('projector')">
                <div class="item-icon">
                    <img src="projector.png" alt="بروجيكتور">
                </div>
                <div class="item-label">بروجيكتور السينما</div>
            </div>

        </div>

        <!-- الصندوق الزجاجي المنبثق -->
        <div id="memory-modal" class="modal-overlay">
            <div class="modal-content" id="modal-card">
                <span class="close-btn" onclick="closeMemory()">&times;</span>
                <div class="modal-body">
                    <div class="modal-image-side">
                        <img id="memory-img" src="" alt="الذكرى">
                    </div>
                    <div class="modal-text-side">
                        <h2 id="memory-title"></h2>
                        <p id="memory-text"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
