<!DOCTYPE html>

<html lang="en">

<head>
  
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Our Love Story ❤️</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="background-glow"></div>

<section id="welcomeScreen">

<div class="hero-box">

<h1>

Our Love Story ❤️

</h1>

<p>

A collection of beautiful memories

</p>

<button id="startBtn">

Begin Journey

</button>

</div>

</section>

<section id="memoryRoom">

<h2>

Memory Room

</h2>

<p class="subtitle">

Choose a memory to open ❤️

</p>

<div class="memory-grid">

<div class="memory-item"
data-memory="1">

<div class="camera">

<div class="lens"></div>

</div>

<span>

First Memory

</span>

</div>

<div class="memory-item"
data-memory="2">

<div class="gift-box">

<div class="gift-lid"></div>

</div>

<span>

Second Memory

</span>

</div>

<div class="memory-item"
data-memory="3">

<div class="frame">

🖼

</div>

<span>

Third Memory

</span>

</div>

<div class="memory-item"
data-memory="4">

<div class="balloon">

❤

</div>

<span>

Fourth Memory

</span>

</div>

<div class="memory-item"
data-memory="5">

<div class="book">

MEMORIES

</div>

<span>

Final Memory

</span>

</div>

</div>

<div id="viewer">

<img id="viewerImage"
src="">

<h3 id="viewerTitle"></h3>

<p id="viewerText"></p>

</div>

</section>

<script src="script.js"></script>

</body>

</html>
