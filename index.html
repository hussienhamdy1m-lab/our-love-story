<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع ذكرياتنا السحري ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Aref+Ruqaa:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* كود سريع لضمان اختفاء أي مستطيل أسود معلق */
        .shutter, #shutter-top, #shutter-bottom, #flash-effect { display: none !important; opacity: 0 !important; visibility: hidden !important; }
    </style>
</head>
<body>

    <!-- الموسيقى الأساسية للموقع كله -->
    <audio id="bg-music" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <!-- طبقة تأثير المطر (القلوب والنجوم) -->
    <div id="rain-layer"></div>

    <!-- 👑 شاشة الدخول المظبوطة بالملي على شكل صورتك البينك 👑 -->
    <div id="login-screen" class="glass-panel">
        <h1 class="main-title" style="font-family: 'Aref Ruqaa', serif; color: #ff4a75; font-size: 3.5rem; margin-bottom: 10px;">أَنَا بَحِبِّك يَا شَهْد ❤️</h1>
        <p class="sub-title" style="font-size: 1.3rem; color: #666; margin-bottom: 25px;">لازم تقولي "وأنا كمان بحبك يا حسين" عشان تخشي تشوفي المفاجأة 😉</p>
        
        <!-- خانة كتابة الباسورد النظيفة -->
        <input type="text" id="password-input" placeholder="اكتبي الجملة هنا..." autocomplete="off" style="width: 80%; max-width: 400px; padding: 12px 20px; border: 2px solid #ff4a75; border-radius: 25px; text-align: center; font-size: 1.1rem; margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto;">
        
        <!-- الزرار مربوط بدالة الفحص بالملّي -->
        <button class="magic-btn" onclick="checkPassword()" style="background: #fff; color: #ff4a75; border: 2px solid #ff4a75; padding: 12px 35px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 1.2rem; transition: 0.3s;">قولتها، يلا ندخل ✨</button>
        
        <p id="error-message" style="display: none; color: #ff4a4a; margin-top: 15px; font-weight: bold;">الجملة خاطئة! اكتبيها بالظبط: انا بحبك يا شهد</p>
    </div>

    <!-- المحتوى الرئيسي للموقع بعد فتح كلمة السر -->
    <div id="main-content" style="display: none;">
        <header class="site-header">
            <h1 class="site-title">متحف ذكرياتنا الجميلة</h1>
            <p class="site-subtitle">اضغطي على أي عنصر لتفتحي صندوق الذكريات</p>
        </header>

        <!-- العناصر التفاعلية السحرية في الصفحة الأولى -->
        <div class="interactive-container">
            <div class="memory-item" onclick="openMemory('envelope', event)">
                <img src="envelope.png" alt="الجواب">
                <span>الجواب الرومانسي</span>
            </div>
            <div class="memory-item" onclick="openMemory('camera', event)">
                <img src="camera.png" alt="الكاميرا">
                <span>لقطة الكاميرا</span>
            </div>
            
            <!-- زرار السينما -->
            <div class="memory-item highlight-item" onclick="goToCinemaPage()">
                <img src="projector.png" alt="السينما">
                <span style="color: #ffde6a; font-weight: 900;">سينما حكاياتنا 🎬</span>
            </div>
            
            <div class="memory-item" onclick="openMemory('bottle', event)">
                <img src="bottle.png" alt="الزجاجة">
                <span>رسالة في زجاجة</span>
            </div>
        </div>
    </div>

    <!-- نافذة عرض الذكرى (البوب أب) -->
    <div id="memory-modal" class="modal-overlay" onclick="closeMemory()">
        <div id="modal-card" class="modal-card" onclick="event.stopPropagation()">
            <button class="close-modal-btn" onclick="closeMemory()">×</button>
            <h2 id="memory-title" class="modal-title"></h2>
            <div class="modal-body">
                <img id="memory-img" src="" alt="الذكرى" class="modal-image" style="max-height: 400px; object-fit: contain;">
                <p id="memory-text" class="modal-text" style="white-space: pre-line; text-align: right; line-height: 1.8;"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
