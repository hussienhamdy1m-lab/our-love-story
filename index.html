<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قصتنا الحلوة 💖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- خلفيات وأساسيات -->
    <div class="bokeh"></div>
    <div class="bokeh"></div>
    <div class="bokeh"></div>
    <div id="flash-effect"></div>

    <!-- طبقات الأنيميشن الوهمية الجديدة -->
    <div id="shutter-top" class="shutter shutter-top"></div>
    <div id="shutter-bottom" class="shutter shutter-bottom"></div>
    <div id="ocean-wave" class="ocean-wave"></div>
    <div id="cinematic-overlay" class="cinematic-overlay"><div class="projector-beam"></div></div>

    <!-- شاشة الباسورد -->
    <div id="login-screen" class="login-container">
        <h2>الباب السري 🔒</h2>
        <p>أدخل كلمة السر عشان تشوف المفاجأة ✨</p>
        <input type="password" id="password-input" placeholder="••••••••">
        <button onclick="checkPassword()">دخول الحكاية ✨</button>
        <p id="error-message" class="error">الباسورد غلط، حاول تاني! 🥺</p>
    </div>

    <!-- المحتوى الرئيسي -->
    <div id="main-content" style="display: none;">
        <h1 class="main-title">عالم ذكرياتنا السحري ✨</h1>
        <p class="main-subtitle">اضغطي على أي عنصر عشان تفتحي ذكرى مخفية...</p>

        <!-- العناصر بقت تحت بعض (Vertical) -->
        <div class="items-grid">
            <div class="magic-item" onclick="openMemory('envelope', event)">
                <div class="item-icon"><img src="envelope.png" alt="جواب"></div>
                <div class="item-label">الجواب الرومانسي</div>
            </div>
            <div class="magic-item" onclick="openMemory('camera', event)">
                <div class="item-icon"><img src="camera.png" alt="كاميرا"></div>
                <div class="item-label">الكاميرا العتيقة</div>
            </div>
            <div class="magic-item" onclick="openMemory('book', event)">
                <div class="item-icon"><img src="book.png" alt="كتاب"></div>
                <div class="item-label">كتاب الحكايات</div>
            </div>
            <div class="magic-item" onclick="openMemory('bottle', event)">
                <div class="item-icon"><img src="bottle.png" alt="زجاجة"></div>
                <div class="item-label">رسالة في زجاجة</div>
            </div>
            <div class="magic-item" onclick="openMemory('projector', event)">
                <div class="item-icon"><img src="projector.png" alt="بروجيكتور"></div>
                <div class="item-label">بروجيكتور السينما</div>
            </div>
        </div>

        <!-- الصندوق الزجاجي للذكريات -->
        <div id="memory-modal" class="modal-overlay">
            <div class="modal-content" id="modal-card">
                <span class="close-btn" onclick="closeMemory()">&times;</span>
                <div class="modal-body">
                    <div class="modal-image-side">
                        <img id="memory-img" src="" alt="الذكرى">
                    </div>
                    <div class="modal-text-side">
                        <h2 id="memory-title"></h2>
                        <p id="memory-text"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
