<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قصتنا الحلوة 💖</title>
    <!-- الربط المباشر لأن الملف في نفس المجلد -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- شاشة إدخال الباسورد -->
    <div id="login-screen" class="login-container">
        <h2>الباب السري 🔒</h2>
        <p>أدخل كلمة السر عشان تشوف المفاجأة ✨</p>
        <input type="password" id="password-input" placeholder="كلمة السر...">
        <button onclick="checkPassword()">دخول</button>
        <p id="error-message" class="error">الباسورد غلط، حاول تاني! 🥺</p>
    </div>

    <!-- المحتوى الرئيسي (هيكون مخفي لحد ما تكتب الباسورد) -->
    <div id="main-content" style="display: none;">
        <div class="container">
            <h1>أجمل قصة حب 🥰</h1>
            <p>المكان ده معمول مخصوص عشان يجمع أحلى اللحظات والذكريات. ✨<br>كل يوم بيعدي هو حكاية جديدة بنكتبها سوا.</p>
            
            <!-- الصور هنا مربوطة مباشرة بأسماء ملفاتك وامتداداتها المكتوبة في الصورة -->
            <div class="gallery">
                <img src="1.jpg" alt="صورتنا سوا" class="love-photo">
                <img src="2.png" alt="ذكرى حلوة" class="love-photo">
                <img src="3.jpeg" alt="لحظة مميزة" class="love-photo">
            </div>
        </div>
    </div>

    <!-- ربط الجافاسكريبت المباشر -->
    <script src="script.js"></script>
</body>
</html>
